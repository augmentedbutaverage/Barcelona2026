<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A polished Barcelona 2026 travel gallery with fullscreen viewing."
    />
    <title>Barcelona 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=20260718-6" />
  </head>
  <body>
    <div class="page-shell">
      <div class="ambient ambient-left"></div>
      <div class="ambient ambient-right"></div>

      <main>
        <section class="gallery-section" aria-label="Photo gallery">
          <div class="gallery-header">
            <div>
              <p class="section-label">Gallery</p>
              <h2>Sea light, tiled shadows, and a very unfair amount of charm</h2>
            </div>
          </div>
          <div class="gallery-grid" id="gallery"></div>
        </section>
      </main>
    </div>

    <dialog class="lightbox" id="lightbox" aria-label="Image viewer">
      <form method="dialog" class="lightbox-chrome">
        <button class="icon-button close-button" aria-label="Close viewer">
          <span aria-hidden="true">×</span>
        </button>
      </form>

      <button class="nav-button nav-prev" id="prevButton" aria-label="Previous image">
        <span aria-hidden="true">‹</span>
      </button>

      <figure class="lightbox-figure">
        <img id="lightboxImage" alt="" />
        <figcaption id="lightboxCaption"></figcaption>
      </figure>

      <button class="nav-button nav-next" id="nextButton" aria-label="Next image">
        <span aria-hidden="true">›</span>
      </button>
    </dialog>

    <script src="script.js?v=20260718-7"></script>
  </body>
</html>
